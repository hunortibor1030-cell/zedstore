<html lang="en">
<head>

<body>
    <h1>Zedbash</h1>

    <button onclick="download()">Download Zedbash (.zip)</button> <button onclick="downloadexe()">download zedbash (.exe)</button>
    <script>
        function download() {
            const link = document.createElement("a");
            link.href = "https://github.com/hunortibor1030-cell/zedpack/releases/latest/download/zedbash.zip";
            link.click();
        }
    </script>
    <script>
        function downloadexe() {
